namespace:
    key: hmpps-electronic-monitoring-data-insights
    name: hmpps-electronic-monitoring-data-insights
    description: Feature flags for EMDI
flags:
    - key: enable-heatmap
      name: enable-heatmap
      type: BOOLEAN_FLAG_TYPE
      enabled: true
    - key: enable-ping-card-navigation
      name: enable-ping-card-navigation
      type: BOOLEAN_FLAG_TYPE
      enabled: true
    - key: ping-card-navigation-variant
      name: ping-card-navigation-variant
      type: VARIANT_FLAG_TYPE
      description: Is used to determine which navigation design is shown
      enabled: true
      variants:
        - key: arrows
          name: arrows
          description: arrows vairant
          attachment: {}
        - default: true
          key: numbers
          name: numbers
          description: numbers variant
          attachment: {}
