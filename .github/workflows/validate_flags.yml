name: Validate Flags

on:
  pull_request:
    paths:
      - "flags/**"
      - "flipt/scripts/lint-flags.go"
      - "makefile"
      - ".github/workflows/validate_flags.yml"

permissions:
  contents: read

env:
  FLIPT_VERSION: v2.5.0
  FLIPT_ARCHIVE: flipt_linux_x86_64.tar.gz
  FLIPT_SHA256: 34b331659a64449cf7072ff9c427b3a2ef955766f66ab80a61a6abe158119ba8
  GO_VERSION: 1.24.5

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Install Flipt CLI
        run: |
          set -euo pipefail

          release_url="https://github.com/flipt-io/flipt/releases/download/${FLIPT_VERSION}"

          curl --fail --show-error --silent --location \
            --output "${FLIPT_ARCHIVE}" \
            "${release_url}/${FLIPT_ARCHIVE}"

          echo "${FLIPT_SHA256}  ${FLIPT_ARCHIVE}" | sha256sum --check --

          mkdir -p "${RUNNER_TEMP}/bin"
          tar --extract --gzip --file "${FLIPT_ARCHIVE}" flipt
          install -m 0755 flipt "${RUNNER_TEMP}/bin/flipt"
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"
      - run: make flags-validate

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b # v5.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: make flags-lint
