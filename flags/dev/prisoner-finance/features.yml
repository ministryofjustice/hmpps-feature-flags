namespace:
    key: prisoner-finance
    name: prisoner-finance
    description: prisoner finance UI
flags:
    - key: grant-bonus-to-prisoners-enabled
      name: grant-bonus-to-prisoners-enabled
      type: BOOLEAN_FLAG_TYPE
      description: Enable grant bonus to prisoners functionality
      enabled: true
    - key: credit-account-enabled
      name: credit-account-enabled
      type: BOOLEAN_FLAG_TYPE
      description: Allow credit account functionality
      enabled: true
    - key: data-warning-banner-enabled
      name: data-warning-banner-enabled
      type: BOOLEAN_FLAG_TYPE
      description: Banner warning that any data entered will not be processed
      enabled: true
    - key: action-panel-enabled
      name: action-panel-enabled
      type: BOOLEAN_FLAG_TYPE
      description: Activate the prisoner profile action panel and its functions
      enabled: false
