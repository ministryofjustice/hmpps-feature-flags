namespace:
    key: consider-a-recall
    name: consider-a-recall
    description: Consider a Recall (CaR)
flags:
    - key: PPUD-Oct-2025-Rollout
      name: PPUD Oct 2025 Rollout
      type: BOOLEAN_FLAG_TYPE
      description: For aligning with PPUD's October 2025 rollout of new changes
      enabled: false
      rollouts:
        - segment:
            keys:
                - PPUD-Oct-2025-rollout
            value: true
    - key: ui-flagFTR56Enabled
      name: '[UI] FTR 56 Features'
      type: BOOLEAN_FLAG_TYPE
      description: For managing FTR56 features
      enabled: true
    - key: ui-flagRecommendationsPage
      name: '[UI] Recommendations tab'
      type: BOOLEAN_FLAG_TYPE
      description: Shows a "Recommendations" tab in Case summary, with a list of all recommendations that have been created for that CRN
      enabled: false
    - key: ui-flagDeleteRecommendation
      name: '[UI] Allow deletion of a recommendation'
      type: BOOLEAN_FLAG_TYPE
      description: Development team use only - shows links on the Recommendations tab allowing any recommendation to be marked as deleted. Deleting a recommendation allows a new one to be created, if needed. The "deleted" recommendation will be retained in the database, and no data or audit info will be lost.
      enabled: false
segments:
    - key: PPUD-Oct-2025-rollout
      name: PPUD Oct 2025 rollout
      description: For aligning with PPUD's October 2025 rollout of new changes
      constraints:
        - type: DATETIME_COMPARISON_TYPE
          property: currentDateTime
          operator: gte
          value: "2025-10-31T00:00:00Z"
      match_type: ALL_MATCH_TYPE
    - key: api-ftr48-template
      name: '[API] FTR48 template'
      description: Marks the cutoff date & time after which the FTR48 template should be used, barring segments for templates with a later cutoff date & time
      match_type: ALL_MATCH_TYPE
    - key: api-risk-to-self-template
      name: '[API] Risk to Self template'
      description: Marks the cutoff date & time after which the Risk to Self template should be used, barring segments for templates with a later cutoff date & time
      match_type: ALL_MATCH_TYPE
    - key: api-ftr56-template
      name: '[API] FTR56 template'
      description: Marks the cutoff date & time after which the FTR56 template should be used, barring segments for templates with a later cutoff date & time
      match_type: ALL_MATCH_TYPE
