name: Validate Flags

on:
  pull_request:
    paths:
      - "flags/**"
      - "flipt/scripts/lint-flags.go"
      - "makefile"
      - ".github/workflows/validate_flags.yml"

permissions:
  contents: read

env:
  INSTALL_FLIPT_VERSION: v2.10.0
  INSTALL_FLIPT_ARCHIVE: flipt_linux_x86_64.tar.gz
  INSTALL_FLIPT_SHA256: 157f200d8ef5db5ef58df586a6aeb2e669b6536afb7c3aa4547846684f97ef8a
  GO_VERSION: 1.24.5

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - name: Install Flipt CLI
        run: |
          set -euo pipefail

          release_url="https://github.com/flipt-io/flipt/releases/download/${INSTALL_FLIPT_VERSION}"

          curl --fail --show-error --silent --location \
            --output "${INSTALL_FLIPT_ARCHIVE}" \
            "${release_url}/${INSTALL_FLIPT_ARCHIVE}"

          echo "${INSTALL_FLIPT_SHA256}  ${INSTALL_FLIPT_ARCHIVE}" | sha256sum --check --

          mkdir -p "${RUNNER_TEMP}/bin"
          extract_dir="$(mktemp -d)"
          tar --extract --gzip --directory "${extract_dir}" --file "${INSTALL_FLIPT_ARCHIVE}" flipt
          install -m 0755 "${extract_dir}/flipt" "${RUNNER_TEMP}/bin/flipt"
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"
      - run: make flags-validate

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: make flags-lint
